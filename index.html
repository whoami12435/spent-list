<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Money Tracker</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="app">


<h1>💰 Money Tracker</h1>



<div class="summary">


<div class="box">

<h3>📈 รายรับเดือนนี้</h3>

<p id="monthIncome">0</p>

</div>



<div class="box">

<h3>📉 รายจ่ายเดือนนี้</h3>

<p id="monthExpense">0</p>

</div>



<div class="box">

<h3>💰 เงินคงเหลือ</h3>

<p id="balance">0</p>

</div>


</div>





<div class="card">


<div class="grid">


<input id="title" placeholder="รายการ">


<input id="amount"
type="number"
placeholder="จำนวนเงิน">



<select id="type" onchange="changeType()">
    <option value="income">รายรับ</option>
    <option value="expense">รายจ่าย</option>
    <option value="note">📝 Note</option>
</select>



<input id="category"
placeholder="หมวด เช่น อาหาร">


</div>




<textarea id="note"
placeholder="Note"></textarea>



<button onclick="addData()">

+ เพิ่มรายการ

</button>


</div>






<div class="card">


<h2>📅 ประวัติ</h2>


<input type="date"
id="filter"
onchange="showData()">



<table>


<thead>

<tr>

<th>วันที่</th>
<th>รายการ</th>
<th>หมวด</th>
<th>เงิน</th>
<th>Note</th>
<th>จัดการ</th>

</tr>

</thead>


<tbody id="table">


</tbody>
</table>


</div>




</div>
<div class="card">
<h2> note</h2>
</div>


<script type="module" src="./script.js"></script>


</body>

</html>
